pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npx eslint {staged_files} --max-warnings=0
      stage_fixed: true
    
    typecheck:
      run: npx tsc --noEmit
    
    format:
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: npx prettier --check {staged_files}

pre-push:
  commands:
    test:
      run: npx vitest run --passWithNoTests
